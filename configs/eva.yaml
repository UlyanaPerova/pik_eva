# Правила разбалловки Евы
# Каждый критерий — список порогов: значение < max → points баллов

output_filename: "расчет_ева.xlsx"

# Алиасы названий ЖК: застройщик → ДОМ.РФ (каноническое)
# Если у ЖК есть строки в конфиге DomRF, данные застройщика
# привязываются к каноническому имени, а не создают дубли
complex_aliases:
  "Сибирово": "Сиберово"

# Маппинг корпусов застройщика → корпус DomRF (по ЖК)
# Формат: "ЖК": {"паттерн_застройщика": "корпус_ДомРФ"}
# Паттерн может начинаться с ^ для prefix-match
building_aliases:
  "Мой Ритм":
    "М1/1-1": "М1/ПК-1"
    "М1/1-2": "М1/ПК-1"
  "Дом на Исхаки":
    "Гаяза Исхаки": "1"
  "Мифы":
    "Патриса Лумумбы": "1"
  "Адали":
    "Дом 1": "1"
    "Дом 2": "1"
    "Дом 3": "1"
  "Вознесенский Квартал":
    "^Дом I очередь": "1"
    "^Дом II очередь": "2"
    "^Дом III очередь": "3"
  "Крыловка парк":
    "^Дом 4": "4"
  "Минтимер":
    "^Дом I очередь": "1"
    "^Дом II очередь": "2"
  "Яналиф":
    "^Дом I очередь": "1 очередь"
    "^Дом II очередь": "2 очередь"
    "^Дом III очередь": "3 очередь"
    "^Дом IV очередь": "4 очередь"

scoring:
  # 1. Срок ввода (месяцы до сдачи)
  deadline_months:
    - {max: 6,   points: 20}
    - {max: 12,  points: 15}
    - {max: 24,  points: 5}
    - {max: 9999, points: 0}

  # 2. Соотношение кол-ва квартир к кладовым
  apartment_storehouse_ratio:
    - {max: 5,   points: 0}
    - {max: 7,   points: 10}
    - {max: 10,  points: 15}
    - {max: 13,  points: 20, bonus_per_unit: 1}
    - {max: 9999, points: 25, bonus_per_unit: 2}

  # 3. Соотношение цены м² квартир к кладовым
  price_ratio:
    - {max: 3,   points: 0}
    - {max: 4,   points: 5}
    - {max: 5,   points: 10}
    - {max: 9999, points: 15}

  # 4. Квартирография (% от общего кол-ва)
  kvartirografia:
    studio_1k:   # студии + 1к
      - {max: 40,  points: 0}
      - {max: 50,  points: 2}
      - {max: 100, points: 5}
    two_k:       # 2к
      - {max: 40,  points: 0}
      - {max: 50,  points: 1}
      - {max: 100, points: 2}
    three_4k:    # 3к + 4к
      - {max: 10,  points: 2}
      - {max: 15,  points: 0}
      - {max: 100, points: -5}

  # 5. Средняя площадь (м²) — баллы за каждый тип квартиры
  avg_area:
    studio:
      - {max: 25, points: 2}
      - {max: 30, points: 1}
      - {max: 9999, points: 0}
    one_k:
      - {max: 35, points: 2}
      - {max: 43, points: 1}
      - {max: 9999, points: 0}
    two_k:
      - {max: 55, points: 2}
      - {max: 63, points: 1}
      - {max: 9999, points: 0}
    three_k:
      - {max: 78, points: 2}
      - {max: 88, points: 1}
      - {max: 9999, points: 0}
    four_k:
      - {max: 100, points: 2}
      - {max: 120, points: 1}
      - {max: 9999, points: 0}

  # 6. Средняя нежилая площадь (м²)
  avg_non_living:
    studio:
      - {max: 13, points: 2}
      - {max: 17, points: 1}
      - {max: 9999, points: 0}
    one_k:
      - {max: 23, points: 2}
      - {max: 26, points: 1}
      - {max: 9999, points: 0}
    two_k:
      - {max: 28, points: 2}
      - {max: 35, points: 1}
      - {max: 9999, points: 0}
    three_k:
      - {max: 35, points: 2}
      - {max: 45, points: 1}
      - {max: 9999, points: 0}
    four_k:
      - {max: 40, points: 2}
      - {max: 60, points: 1}
      - {max: 9999, points: 0}

  # 7. Соотношение квартир к балконам (РУЧНОЙ ВВОД)
  balcony_ratio:
    - {max: 1,   points: -10}
    - {max: 2,   points: 5}
    - {max: 9999, points: 10}

  # 8. Размер балконов (РУЧНОЙ ВВОД)
  balcony_size:
    С: 0
    Б: -15
    М: 5

  # 9. Локация ЖК (РУЧНОЙ ВВОД)
  location:
    Центр: 5
    Норм: 3
    Окраина: 0
    Фу: -5

  # 10. Удобство доступа (РУЧНОЙ ВВОД)
  access:
    Лифт: 5
    Улица: -10
    Лестница: 0
    "Лифт+Улица": 10

  # 11. Площадь кладовки (м²)
  storehouse_area:
    - {max: 2.5, points: -15}
    - {max: 4,   points: 10}
    - {max: 5,   points: 7}
    - {max: 6,   points: 5}
    - {max: 9999, points: 2}

  # 12. Стоимость кладовки (₽)
  storehouse_price:
    - {max: 300000,  points: 15}
    - {max: 350000,  points: 12}
    - {max: 400000,  points: 8}
    - {max: 500000,  points: 5}
    - {max: 650000,  points: 2}
    - {max: 999999999, points: 0}

  # 13. Цена кладовки за м² (₽/м²)
  storehouse_ppm:
    - {max: 65000,  points: 10}
    - {max: 70000,  points: 7}
    - {max: 85000,  points: 5}
    - {max: 100000, points: 2}
    - {max: 999999999, points: 0}

  # ── ПЕРВЫЙ ЭТАП: параметры Excel-формул (ранее захардкожены в scoring.py) ──

  # F1: Срок ввода — линейная интерполяция по дням
  deadline_formula:
    tier1_days: 365        # до этого порога: от tier1_max_pts убывает
    tier1_max_pts: 20      # баллов при 0 дней
    tier1_decay_pts: 10    # сколько баллов теряется за tier1_days дней
    tier2_days: 730        # второй порог
    tier2_max_pts: 10      # баллов при tier1_days дней
    tier2_decay_pts: 5     # сколько баллов теряется за (tier2 - tier1) дней

  # F2: Соотношение квартир/кладовых — кусочно-линейная шкала
  apt_store_ratio_formula:
    # breakpoints: [[порог, базовые_баллы, множитель_за_единицу], ...]
    # При ratio < 5: -10 - (5 - ratio) * 2
    # При ratio 5-10: 15 + (ratio - 5) * 5
    # При ratio 10-15: 40 + (ratio - 10) * 10
    # При ratio > 15: 90 + (ratio - 15) * 15
    under_5_base: -10
    under_5_mult: 2
    tier_5_10_base: 15
    tier_5_10_mult: 5
    tier_10_15_base: 40
    tier_10_15_mult: 10
    over_15_base: 90
    over_15_mult: 15

  # F4-F5: Бонусы квартирографии за хорошие балконы
  balcony_bonus:
    # При ratio 1.5-2 и размер "М": повышенные баллы за 2к и 3к+4к
    two_k_bonus_ratio_range: [1.5, 2]
    two_k_bonus_size: "М"
    two_k_bonus_tiers: [{max: 40, points: 1}, {max: 50, points: 3}, {max: 100, points: 5}]
    # При ratio > 2 и размер "М" или "С"
    two_k_bonus2_ratio_min: 2
    two_k_bonus2_sizes: ["М", "С"]
    two_k_bonus2_tiers: [{max: 40, points: 2}, {max: 50, points: 5}, {max: 100, points: 7}]
    # 3к+4к аналогично
    three_4k_bonus_tiers: [{max: 10, points: 2}, {max: 15, points: 5}, {max: 100, points: 10}]
    three_4k_bonus2_tiers: [{max: 10, points: 5}, {max: 15, points: 10}, {max: 100, points: 15}]

  # F8: Соотношение квартир/балконов — кусочно-линейная шкала
  balcony_ratio_formula:
    # breakpoints: [[порог, базовые_баллы], ...]
    breakpoints:
      - [1.0, -10]
      - [1.5, 5]
      - [2.0, 10]
      - [2.5, 15]
      - [3.0, 22.5]
      - [3.5, 35]
      - [4.0, 50]
      - [99, 67.5]     # выше 4 — экстраполяция

  # ── ВТОРОЙ ЭТАП: параметры Excel-формулы (линейная интерполяция) ──
  # Эти параметры используются для генерации Excel-формул на листе «кладовки».
  # Пользователь может изменить пороги — формулы перегенерируются автоматически.
  second_stage:
    # Площадь кладовки: < area_min → штраф, ≤ area_good → бонус, > → убывает
    area_min: 2.5          # м², ниже — штраф
    area_good: 4.5         # м², оптимальная площадь
    area_good_pts: 5       # баллов за оптимальную площадь
    area_penalty: -20      # штраф за слишком маленькую
    area_decay_per_m2: 3   # снижение баллов за каждый м² сверх area_good

    # Стоимость: линейно от 0 до price_max → price_max_pts баллов
    price_max: 650000      # ₽, потолок для линейной шкалы
    price_max_pts: 10      # баллов при стоимости 0
    price_penalty_threshold: 1000000  # ₽, выше → штраф
    price_penalty: -5      # штраф при стоимости > порога

    # Цена/м²: линейно от 0 до ppm_max → ppm_max_pts баллов
    ppm_max: 110000        # ₽/м², потолок
    ppm_max_pts: 20        # баллов при цене/м² = 0
    ppm_range: 60000       # диапазон для нормировки

    # Соотнош. цены квартир/кладовок: точка перелома и множители
    ratio_pivot: 3         # при ratio < pivot → штраф, > pivot → бонус
    ratio_penalty_mult: 30 # множитель штрафа
    ratio_bonus_mult: 5    # множитель бонуса
