# СМУ-88 — застройщик
# "Проект" на сайте = ЖК в таблице. "Место" = номер кладовки.
name: "СМУ-88"
key: "smu88"
base_url: "https://smu88.group"
strategy: "browser"

field_mapping:
  project: "complex_name"   # "проект" на сайте → ЖК в таблице
  place: "item_number"       # "место" на сайте → номер кладовки

links:
  - url: "https://smu88.group/kladovye"
    complex_name: "_all"  # парсить все ЖК (проекты) со страницы
    city: "Казань"
    notes: >
      Кладовки по всем ЖК. "Проект" = ЖК, "Место" = номер кладовки.
      Прожимать "показать ещё".

# ─── Квартиры ───────────────────────────────────────────
apartment_links:
  - url: "https://smu88.group/kvartiry?city=kazan"
    complex_name: "_all"
    city: "Казань"
    notes: >
      Квартиры по всем ЖК в Казани.
      Прожимать "показать ещё".
